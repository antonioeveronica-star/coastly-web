# Netlify configuration for Coastly website
[build]
  publish = "."
  command = ""

# Disable password protection
[[basic_auth]]
  path = "/*"
  status = 0

# Cache configuration
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate, max-age=0"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate, max-age=0"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Redirects
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/termini"
  to = "/termini.html"
  status = 200
